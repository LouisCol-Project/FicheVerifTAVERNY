<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique Vérifications – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

<!-- Font Awesome pour icônes -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif; }
body { background:#fff3e0; color:#212121; display:flex; flex-direction:column; min-height:100vh; }

/* ===== HEADER ===== */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  background:#d32f2f;
  color:white;
  border-radius:0 0 12px 12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}
header img { height:40px; border-radius:6px; border:2px solid #fff; }
header h1 { flex:1; text-align:center; font-size:1rem; font-weight:700; margin:0 0.5rem; }
header #date { font-size:0.8rem; opacity:0.85; }

/* ===== ALERT MESSAGE ===== */
#attention-msg {
  background:#ffb74d;
  color:#b71c1c;
  font-weight:bold;
  text-align:center;
  padding:0.7rem;
  border-radius:10px;
  box-shadow:0 0 12px #ff6f00;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.2rem;
  margin:0.5rem 0;
}

/* ===== FIELDSETS ===== */
fieldset {
  border:2px solid #b71c1c;
  border-radius:10px;
  padding:0.8rem;
  background:#fff8e1;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  margin-bottom:0.8rem;
}
legend { font-weight:bold; color:#b71c1c; padding:0 5px; font-size:0.9rem; }

/* ===== IMAGES ===== */
.image-container {
  width:100%;
  margin:0.5rem 0;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.image-container img { width:100%; height:auto; display:block; border-radius:8px; }

/* ===== CHECKLIST ===== */
label {
  display:flex;
  align-items:center;
  gap:8px;
  padding:0.5rem;
  border-bottom:1px solid #ffe0b2;
  font-size:0.85rem;
  cursor:pointer;
  border-radius:5px;
  transition:0.2s;
}
label:hover { background:#fff176; }
input[type="checkbox"] { transform:scale(1.3); accent-color:#b71c1c; }
label.missing { background:#ed1c24; color:white; font-weight:bold; }

/* ===== BOUTONS ===== */
.buttons {
  display:flex;
  justify-content:center;
  margin:1rem 0 2rem 0;
}
button {
  width:95%;
  padding:0.8rem;
  border:none;
  border-radius:10px;
  font-size:1rem;
  font-weight:bold;
  background:#b71c1c;
  color:white;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  transition:0.3s;
}
button:hover { transform:translateY(-2px); background:#d32f2f; }

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:0.75rem;
  padding:0.5rem;
  background:#ffd54f;
  color:#b71c1c;
  font-weight:bold;
  border-top-left-radius:10px;
  border-top-right-radius:10px;
}

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width:480px){
  header img { height:35px; }
  header h1 { font-size:0.95rem; }
  header #date { font-size:0.75rem; }
  label { font-size:0.8rem; padding:0.4rem; }
  button { font-size:0.95rem; padding:0.7rem; }
  fieldset { padding:0.7rem; }
  legend { font-size:0.85rem; }
}
</style>
</head>

<body>

<header>
  <img src="images/logo.png" alt="Logo CIS Taverny">
  <h1>Historique des vérifications</h1>
  <div id="date"></div>
</header>

<!-- Filtres -->
<div class="filters">
  <label>Date : <input type="date" id="filter-date"></label>
  <label>Véhicule :
    <select id="filter-verif">
      <option value="">Tous</option>
    </select>
  </label>
  <button id="apply-filters">Appliquer</button>
  <button onclick="location.href='index.html'">Menu principal</button>
</div>

<!-- Tableau historique -->
<div class="table-container">
  <table id="historique-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Véhicule</th>
        <th>Vérificateur</th>
        <th>Matériel manquant</th>
      </tr>
    </thead>
    <tbody>
      <!-- Rempli dynamiquement par JS -->
    </tbody>
  </table>
</div>

<footer>CIS Taverny – Suivi des vérifications opérationnelles</footer>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD14dNcDQWq4SygSlo8YC8bJWisLYOh0Es",
  authDomain: "veriftav.firebaseapp.com",
  projectId: "veriftav",
  storageBucket: "veriftav.firebasestorage.app",
  messagingSenderId: "401217101102",
  appId: "1:401217101102:web:dd375734d4f0464c146ebf",
  measurementId: "G-KVSC8V8M1B"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Header date
document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// Lundi message
if(new Date().getDay() === 1) document.getElementById('lundi-msg').style.display='block';

// Charger les données
async function loadVerifications() {
  const q = query(collection(db,"verifications"), orderBy("date","desc"));
  const snapshot = await getDocs(q);
  const verifications = [];
  snapshot.forEach(doc => {
    const data = doc.data();
    data.nomDoc = data.nomDoc || doc.id;
    data.verificateur = data.verificateur || "Inconnu";
    verifications.push(data);
  });
  return verifications;
}

// Remplir filtre véhicules
async function populateVerifFilter() {
  const verifs = await loadVerifications();
  const filter = document.getElementById("filter-verif");
  const nomsDocs = Array.from(new Set(verifs.map(v=>v.nomDoc))).sort();
  nomsDocs.forEach(nom=>{
    const option = document.createElement("option");
    option.value = nom;
    option.textContent = nom;
    filter.appendChild(option);
  });
}

// Afficher tableau
function displayHistorique(data) {
  const tbody = document.querySelector("#historique-table tbody");
  tbody.innerHTML = "";
  data.forEach(entry=>{
    const tr = document.createElement("tr");

    const dateStr = new Date(entry.date.seconds*1000).toLocaleDateString('fr-FR');
    
    // Badge véhicule
    let vehBadgeClass="";
    let vehIcon="";
    switch(entry.nomDoc){
      case "VSSUAP": vehBadgeClass="vsav"; vehIcon='<i class="fas fa-ambulance"></i>'; break;
      case "FPTGP": vehBadgeClass="fpt"; vehIcon='<i class="fas fa-fire-extinguisher"></i>'; break;
      case "CCFM": vehBadgeClass="ccf"; vehIcon='<i class="fas fa-tree"></i>'; break;
      case "VSRM": vehBadgeClass="vsr"; vehIcon='<i class="fas fa-car-crash"></i>'; break;
      case "VTU": vehBadgeClass="vtu"; vehIcon='<i class="fas fa-truck"></i>'; break;
          }

    const manquants = Object.entries(entry.data).filter(([k,v])=>!v).map(([k])=>`<span class="anomaly">${k}</span>`).join(" ");
    tr.innerHTML = `
      <td>${dateStr}</td>
      <td><span class="vehicle-badge ${vehBadgeClass}">${vehIcon} ${entry.nomDoc}</span></td>
      <td>${entry.verificateur}</td>
      <td>${manquants || "Aucun"}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Appliquer filtres
async function applyFilters() {
  const dateFilter = document.getElementById("filter-date").value;
  const verifFilter = document.getElementById("filter-verif").value;

  let verifs = await loadVerifications();

  if(dateFilter){
    verifs = verifs.filter(entry=>{
      const entryDate = new Date(entry.date.seconds*1000);
      const [y,m,d] = dateFilter.split("-").map(Number);
      return entryDate.getFullYear()===y && (entryDate.getMonth()+1)===m && entryDate.getDate()===d;
    });
  }

  if(verifFilter) verifs = verifs.filter(entry=>entry.nomDoc===verifFilter);

  displayHistorique(verifs);
}

document.getElementById("apply-filters").addEventListener("click", applyFilters);

await populateVerifFilter();
applyFilters();

</script>
</body>
</html>
