<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique Vérifications – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== RESET ===== */
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif; }
body { background:#fff3e0; color:#212121; display:flex; flex-direction:column; min-height:100vh; padding:0.5rem; }

/* ===== HEADER ===== */
header {
  display:flex;
  flex-direction: column;
  align-items:center;
  padding:0.8rem 1rem;
  background:#d32f2f;
  color:white;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  text-align:center;
  gap:0.5rem;
  position: sticky;
  top:0;
  z-index: 100;
}
header img { height:50px; border-radius:6px; border:2px solid #fff; }
header h1 { font-size:1.1rem; font-weight:700; }
header #date { font-size:0.85rem; opacity:0.9; }

/* ===== ALERT MESSAGE ===== */
#attention-msg {
  background:#ffb74d;
  color:#b71c1c;
  font-weight:bold;
  text-align:center;
  padding:0.7rem;
  border-radius:10px;
  box-shadow:0 0 12px #ff6f00;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.2rem;
  margin:0.5rem 0;
  display:none;
}

/* ===== FILTRES ===== */
.filters {
  display:flex;
  flex-wrap:wrap;
  gap:0.5rem;
  justify-content:center;
  background:rgba(255,255,255,0.95);
  padding:0.5rem;
  border-radius:8px;
  position: sticky;
  top:72px;
  z-index: 90;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.filters label { display:flex; flex-direction: column; gap:0.2rem; font-size:0.9rem; }
.filters select, .filters input { padding:0.4rem; border-radius:6px; border:1px solid #b71c1c; font-size:0.9rem; }

/* ===== TABLEAU HISTORIQUE ===== */
.table-container {
  overflow-x:auto;
  width:100%;
  margin-top:0.5rem;
  margin-bottom:1rem;
}
table {
  width:100%;
  border-collapse:collapse;
  min-width:600px;
}
thead { background:#b71c1c; color:white; }
thead th { padding:0.7rem; font-size:0.85rem; text-align:left; }
tbody tr:nth-child(even){ background:#fff8e1; }
tbody tr:hover { background:#fff176; }
tbody td { padding:0.6rem; font-size:0.85rem; vertical-align:middle; }

/* ===== BADGES VEHICULE ===== */
.vehicle-badge {
  display:inline-flex;
  align-items:center;
  gap:0.3rem;
  padding:0.3rem 0.5rem;
  border-radius:6px;
  font-weight:bold;
  font-size:0.85rem;
  color:white;
}
.vsav { background:#e53935; }
.fpt { background:#f4511e; }
.ccf { background:#43a047; }
.vsr { background:#1e88e5; }
.vtu { background:#6d4c41; }

/* ===== MATERIEL MANQUANT ===== */
.anomaly {
  background:#ed1c24;
  color:white;
  padding:0.2rem 0.4rem;
  border-radius:4px;
  margin-right:0.2rem;
  font-size:0.8rem;
  display:inline-block;
}

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:0.75rem;
  padding:0.5rem;
  background:#ffd54f;
  color:#b71c1c;
  font-weight:bold;
  border-radius:10px 10px 0 0;
  margin-top:auto;
}

/* ===== RESPONSIVE ===== */
@media (max-width:600px){
  header img { height:45px; }
  header h1 { font-size:1rem; }
  header #date { font-size:0.8rem; }

  .filters { flex-direction:column; align-items:stretch; }
  table { min-width:100%; }
  tbody td, thead th { font-size:0.8rem; padding:0.5rem; }
}
</style>
</head>

<body>
<header>
  <img src="images/logo.png" alt="Logo CIS Taverny">
  <h1>Historique des vérifications</h1>
  <div id="date"></div>
</header>

<div id="attention-msg"><i class="fas fa-exclamation-triangle"></i> Vérification spéciale lundi !</div>

<!-- Filtres flottants et recherche instantanée -->
<div class="filters">
  <label>Date :
    <input type="date" id="filter-date">
  </label>
  <label>Véhicule :
    <select id="filter-verif">
      <option value="">Tous</option>
    </select>
  </label>
  <label>Recherche :
    <input type="text" id="filter-search" placeholder="Rechercher vérificateur ou matériel">
  </label>
</div>

<div class="table-container">
  <table id="historique-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Véhicule</th>
        <th>Vérificateur</th>
        <th>Matériel manquant</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<footer>CIS Taverny – Suivi des vérifications opérationnelles</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD14dNcDQWq4SygSlo8YC8bJWisLYOh0Es",
  authDomain: "veriftav.firebaseapp.com",
  projectId: "veriftav",
  storageBucket: "veriftav.firebasestorage.app",
  messagingSenderId: "401217101102",
  appId: "1:401217101102:web:dd375734d4f0464c146ebf",
  measurementId: "G-KVSC8V8M1B"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Header date
document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// Lundi message
if(new Date().getDay() === 1) document.getElementById('attention-msg').style.display='flex';

// Charger les données
let allVerifs = [];
async function loadVerifications() {
  const q = query(collection(db,"verifications"), orderBy("date","desc"));
  const snapshot = await getDocs(q);
  allVerifs = [];
  snapshot.forEach(doc => {
    const data = doc.data();
    data.nomDoc = data.nomDoc || doc.id;
    data.verificateur = data.verificateur || "Inconnu";
    allVerifs.push(data);
  });
  populateVerifFilter();
  displayHistorique(allVerifs);
}

// Remplir filtre véhicules
function populateVerifFilter() {
  const filter = document.getElementById("filter-verif");
  const nomsDocs = Array.from(new Set(allVerifs.map(v=>v.nomDoc))).sort();
  nomsDocs.forEach(nom=>{
    if(!Array.from(filter.options).some(opt=>opt.value===nom)){
      const option = document.createElement("option");
      option.value = nom;
      option.textContent = nom;
      filter.appendChild(option);
    }
  });
}

// Afficher tableau
function displayHistorique(data) {
  const tbody = document.querySelector("#historique-table tbody");
  tbody.innerHTML = "";
  data.forEach(entry=>{
    const tr = document.createElement("tr");

    const dateStr = new Date(entry.date.seconds*1000).toLocaleDateString('fr-FR');
    
    let vehBadgeClass="";
    let vehIcon="";
    switch(entry.nomDoc){
      case "VSSUAP": vehBadgeClass="vsav"; vehIcon='<i class="fas fa-ambulance"></i>'; break;
      case "FPTGP": vehBadgeClass="fpt"; vehIcon='<i class="fas fa-fire-extinguisher"></i>'; break;
      case "CCFM": vehBadgeClass="ccf"; vehIcon='<i class="fas fa-tree"></i>'; break;
      case "VSRM": vehBadgeClass="vsr"; vehIcon='<i class="fas fa-car-crash"></i>'; break;
      case "VTU": vehBadgeClass="vtu"; vehIcon='<i class="fas fa-truck"></i>'; break;
    }

    const manquants = Object.entries(entry.data).filter(([k,v])=>!v).map(([k])=>`<span class="anomaly">${k}</span>`).join(" ");
    tr.innerHTML = `
      <td>${dateStr}</td>
      <td><span class="vehicle-badge ${vehBadgeClass}">${vehIcon} ${entry.nomDoc}</span></td>
      <td>${entry.verificateur}</td>
      <td>${manquants || "Aucun"}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Filtrage en temps réel
function filterData() {
  let filtered = allVerifs;

  const dateFilter = document.getElementById("filter-date").value;
  const verifFilter = document.getElementById("filter-verif").value;
  const searchFilter = document.getElementById("filter-search").value.toLowerCase();

  if(dateFilter){
    filtered = filtered.filter(entry=>{
      const entryDate = new Date(entry.date.seconds*1000);
      const [y,m,d] = dateFilter.split("-").map(Number);
      return entryDate.getFullYear()===y && (entryDate.getMonth()+1)===m && entryDate.getDate()===d;
    });
  }

  if(verifFilter){
    filtered = filtered.filter(entry=>entry.nomDoc===verifFilter);
  }

  if(searchFilter){
    filtered = filtered.filter(entry=>{
      const verif = entry.verificateur.toLowerCase();
      const anomalies = Object.entries(entry.data).filter(([k,v])=>!v).map(([k])=>k.toLowerCase());
      return verif.includes(searchFilter) || anomalies.some(a=>a.includes(searchFilter));
    });
  }

  displayHistorique(filtered);
}

// Événements temps réel
document.getElementById("filter-date").addEventListener("input", filterData);
document.getElementById("filter-verif").addEventListener("change", filterData);
document.getElementById("filter-search").addEventListener("input", filterData);

loadVerifications();
</script>
</body>
</html>
