<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCFM – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif; }
body { background:#fff3e0; color:#212121; display:flex; flex-direction:column; min-height:100vh; }

/* ===== HEADER ===== */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  background:#d32f2f;
  color:white;
  border-radius:0 0 12px 12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}
header img { height:40px; border-radius:6px; border:2px solid #fff; }
header h1 { flex:1; text-align:center; font-size:1rem; font-weight:700; margin:0 0.5rem; }
header #date { font-size:0.8rem; opacity:0.85; }

/* ===== ALERT MESSAGE ===== */
#attention-msg {
  background:#ffb74d;
  color:#b71c1c;
  font-weight:bold;
  text-align:center;
  padding:0.7rem;
  border-radius:10px;
  box-shadow:0 0 12px #ff6f00;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.2rem;
  margin:0.5rem 0;
}

/* ===== FIELDSETS ===== */
fieldset {
  border:2px solid #b71c1c;
  border-radius:10px;
  padding:0.8rem;
  background:#fff8e1;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  margin-bottom:0.8rem;
}
legend { font-weight:bold; color:#b71c1c; padding:0 5px; font-size:0.9rem; }

/* ===== IMAGES ===== */
.image-container {
  width:100%;
  margin:0.5rem 0;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.image-container img { width:100%; height:auto; display:block; border-radius:8px; }

/* ===== CHECKLIST ===== */
label {
  display:flex;
  align-items:center;
  gap:8px;
  padding:0.5rem;
  border-bottom:1px solid #ffe0b2;
  font-size:0.85rem;
  cursor:pointer;
  border-radius:5px;
  transition:0.2s;
}
label:hover { background:#fff176; }
input[type="checkbox"] { transform:scale(1.3); accent-color:#b71c1c; }
label.missing { background:#ed1c24; color:white; font-weight:bold; }

/* ===== BOUTONS ===== */
.buttons {
  display:flex;
  justify-content:center;
  margin:1rem 0 2rem 0;
}
button {
  width:95%;
  padding:0.8rem;
  border:none;
  border-radius:10px;
  font-size:1rem;
  font-weight:bold;
  background:#b71c1c;
  color:white;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  transition:0.3s;
}
button:hover { transform:translateY(-2px); background:#d32f2f; }

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:0.75rem;
  padding:0.5rem;
  background:#ffd54f;
  color:#b71c1c;
  font-weight:bold;
  border-top-left-radius:10px;
  border-top-right-radius:10px;
}

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width:480px){
  header img { height:35px; }
  header h1 { font-size:0.95rem; }
  header #date { font-size:0.75rem; }
  label { font-size:0.8rem; padding:0.4rem; }
  button { font-size:0.95rem; padding:0.7rem; }
  fieldset { padding:0.7rem; }
  legend { font-size:0.85rem; }
}
</style>
</head>

<body>

<header>
  <img src="images/logo.png" alt="Logo CIS Taverny">
  <h1>Vérifications Chef CCFM</h1>
  <div id="date"></div>
</header>

<main>

<fieldset>
    <legend>CABINE ARRIERE CCF</legend>
    <img src="images/CabineavantCCF.jpg" />
    <label><input type="checkbox" id="1 Triangle de pré-signalisation"> 1 Triangle de pré-signalisation</label>
    <label><input type="checkbox" id="5 Masques FENZY + Bouteille ARI"> 5 Masques FENZY + Bouteille ARI</label>
    <label><input type="checkbox" id="2 Ceintures de sécurité pour marche pied"> 2 Ceintures de sécurité pour marche pied</label>
    <label><input type="checkbox" id="Sous le siège Droit : 1 mano pression + flexible et 1 télécommande pour le treuil"> Sous le siège Droit : 1 mano pression + flexible et 1 télécommande pour le treuil</label>
    <label><input type="checkbox" id="Sous le siège Gauche : 1 cric, 1 lot démonte roue et 1 trousse à outils"> Sous le siège Gauche : 1 cric, 1 lot démonte roue et 1 trousse à outils</label>
  </fieldset>

  <fieldset>
    <legend>COFFRE GAUCHE</legend>
    <img src="images/COFFREGAUCHECCF.jpg" />
    <label><input type="checkbox" id="1 Tronçonneuse"> 1 Tronçonneuse</label>
    <label><input type="checkbox" id="1 Paire de guêtre"> 1 Paire de guêtre</label>
    <label><input type="checkbox" id="1 Surpantalon + 1 Veste"> 1 Surpantalon + 1 Veste</label>
    <label><input type="checkbox" id="1 Paire d’élargisseur"> 1 Paire d’élargisseur</label>
    <label><input type="checkbox" id="3 Paires de gants de protection"> 3 Paires de gants de protection</label>
    <label><input type="checkbox" id="1 Jeu d’outils pour tronçonneuse + 1 chaine"> 1 Jeu d’outils pour tronçonneuse + 1 chaine</label>
    <label><input type="checkbox" id="1 Bidon Carburant + Huile de chaine"> 1 Bidon Carburant + Huile de chaine</label>
    <label><input type="checkbox" id="1 Claie de forestage"> 1 Claie de forestage</label>
    <label><input type="checkbox" id="2 Serpes"> 2 Serpes</label>
    <label><input type="checkbox" id="1 Viboux"> 1 Viboux</label>
    <label><input type="checkbox" id="1 Sac avec : 2 tricoises de 110, 1 tricoise de 70, 1 bouchon Ø100, 1 bouchon Ø65 et 1 bouchon Ø40"> 1 Sac avec : 2 tricoises de 110, 1 tricoise de 70, 1 bouchon Ø100, 1 bouchon Ø65 et 1 bouchon Ø40</label>
    <label><input type="checkbox" id="1 Tuyaux Ø70/10m + 1 tuyaux Ø25 gueule baie"> 1 Tuyaux Ø70/10m + 1 tuyaux Ø25 gueule baie</label>
    <label><input type="checkbox" id="1 Division FDF Ø65/2x40 Vanne ¼"> 1 Division FDF Ø65/2x40 Vanne ¼</label>
    <label><input type="checkbox" id="2 Raccords de réduction DSP 65/40"> 2 Raccords de réduction DSP 65/40</label>
    <label><input type="checkbox" id="1 Raccord filtre Ø100"> 1 Raccord filtre Ø100</label>
    <label><input type="checkbox" id="1 Raccord de transformation DSP/GFR Ø40/20 (1 mâle et 1 femelle)"> 1 Raccord de transformation DSP/GFR Ø40/20 (1 mâle et 1 femelle)</label>
    <label><input type="checkbox" id="1 Clé Fédérale"> 1 Clé Fédérale</label>
    <label><input type="checkbox" id="1 Clé de barrage"> 1 Clé de barrage</label>
    <label><input type="checkbox" id="1 Crépine Ø100"> 1 Crépine Ø100</label>
    <label><input type="checkbox" id="1 Flotteur avec chainette"> 1 Flotteur avec chainette</label>
    <label><input type="checkbox" id="1 Collecteur d’alimentation"> 1 Collecteur d’alimentation</label>
    <label><input type="checkbox" id="1 Retenue"> 1 Retenue</label>
    <label><input type="checkbox" id="1 Rallonge électrique pour projecteur"> 1 Rallonge électrique pour projecteur</label>
  </fieldset>

<div class="buttons">
  <button onclick="saveAndReturn()">Enregistrer et revenir au menu</button>
</div>
<footer>
  CIS Taverny – Vérifications opérationnelles
</footer>

<script>
document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// 🔹 Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD14dNcDQWq4SygSlo8YC8bJWisLYOh0Es",
  authDomain: "veriftav.firebaseapp.com",
  projectId: "veriftav",
  storageBucket: "veriftav.firebasestorage.app",
  messagingSenderId: "401217101102",
  appId: "1:401217101102:web:dd375734d4f0464c146ebf",
  measurementId: "G-KVSC8V8M1B"
};

// 🔹 Initialisation Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 Récupérer toutes les checkboxes
function getData() {
  const inputs = document.querySelectorAll("input[type=checkbox]");
  const data = {};
  inputs.forEach(input => data[input.id] = input.checked);
  return data;
}

// 🔹 Surligner les éléments non cochés
function highlightMissing(data) {
  // Reset
  document.querySelectorAll("label").forEach(label => label.style.backgroundColor = "");
  // Surligner les manquants
  for (const [id, checked] of Object.entries(data)) {
    if (!checked) {
      const input = document.getElementById(id);
      if (input) input.parentElement.style.backgroundColor = "#ED1C24";
    }
  }
}

// 🔹 Sauvegarder une vérification avec ID unique basé sur la date
async function saveCheck() {
  const data = getData();
  highlightMissing(data);

  try {
    const timestamp = new Date();
    const docId = "CHEF CCF_" + timestamp.getTime(); // ID unique
    const docRef = doc(db, "verifications", docId);

    // Récupérer le nom du vérificateur depuis localStorage si existant
    const nomVerificateur = localStorage.getItem("nomVerificateur") || "Inconnu";

    await setDoc(docRef, {
      nomDoc: "CHEF CCF",
      date: timestamp,
      verificateur: nomVerificateur,
      data
    });

    const allChecked = Object.values(data).every(v => v === true);
  } catch (e) {
    console.error(e);
    alert("Erreur enregistrement : " + e.message);
  }
}

// 🔹 Charger le dernier état pour surligner les éléments manquants
async function highlightLastMissing() {
  try {
    const q = query(
      collection(db, "verifications"),
      where("nomDoc", "==", "CHEF CCF"),
      orderBy("date", "desc"),
      limit(1)
    );

    const snapshot = await getDocs(q);
    if (!snapshot.empty) {
      const lastDoc = snapshot.docs[0].data();
      highlightMissing(lastDoc.data); // Surligner sans cocher
    }
  } catch (e) {
    console.error("Erreur chargement dernière vérification :", e);
  }
}

// 🔹 Fonction combinée pour le bouton : enregistrer et revenir au menu
window.saveAndReturn = async function() {
  await saveCheck();           // Sauvegarde la vérification
  location.href = "index.html"; // Retour au menu principal
};

// 🔹 Exécuter au chargement pour surligner les éléments manquants précédents
window.addEventListener("DOMContentLoaded", highlightLastMissing);
</script>

</main>

</body>
</html>
