<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPTGP – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif; }
body { background:#fff3e0; color:#212121; display:flex; flex-direction:column; min-height:100vh; }

/* ===== HEADER ===== */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  background:#d32f2f;
  color:white;
  border-radius:0 0 12px 12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}
header img { height:40px; border-radius:6px; border:2px solid #fff; }
header h1 { flex:1; text-align:center; font-size:1rem; font-weight:700; margin:0 0.5rem; }
header #date { font-size:0.8rem; opacity:0.85; }

/* ===== ALERT MESSAGE ===== */
#attention-msg {
  background:#ffb74d;
  color:#b71c1c;
  font-weight:bold;
  text-align:center;
  padding:0.7rem;
  border-radius:10px;
  box-shadow:0 0 12px #ff6f00;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.2rem;
  margin:0.5rem 0;
}

/* ===== FIELDSETS ===== */
fieldset {
  border:2px solid #b71c1c;
  border-radius:10px;
  padding:0.8rem;
  background:#fff8e1;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  margin-bottom:0.8rem;
}
legend { font-weight:bold; color:#b71c1c; padding:0 5px; font-size:0.9rem; }

/* ===== IMAGES ===== */
.image-container {
  width:100%;
  margin:0.5rem 0;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.image-container img { width:100%; height:auto; display:block; border-radius:8px; }

/* ===== CHECKLIST ===== */
label {
  display:flex;
  align-items:center;
  gap:8px;
  padding:0.5rem;
  border-bottom:1px solid #ffe0b2;
  font-size:0.85rem;
  cursor:pointer;
  border-radius:5px;
  transition:0.2s;
}
label:hover { background:#fff176; }
input[type="checkbox"] { transform:scale(1.3); accent-color:#b71c1c; }
label.missing { background:#ed1c24; color:white; font-weight:bold; }

/* ===== BOUTONS ===== */
.buttons {
  display:flex;
  justify-content:center;
  margin:1rem 0 2rem 0;
}
button {
  width:95%;
  padding:0.8rem;
  border:none;
  border-radius:10px;
  font-size:1rem;
  font-weight:bold;
  background:#b71c1c;
  color:white;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  transition:0.3s;
}
button:hover { transform:translateY(-2px); background:#d32f2f; }

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:0.75rem;
  padding:0.5rem;
  background:#ffd54f;
  color:#b71c1c;
  font-weight:bold;
  border-top-left-radius:10px;
  border-top-right-radius:10px;
}

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width:480px){
  header img { height:35px; }
  header h1 { font-size:0.95rem; }
  header #date { font-size:0.75rem; }
  label { font-size:0.8rem; padding:0.4rem; }
  button { font-size:0.95rem; padding:0.7rem; }
  fieldset { padding:0.7rem; }
  legend { font-size:0.85rem; }
}
</style>
</head>

<body>

<header>
  <img src="images/logo.png" alt="Logo CIS Taverny">
  <h1>Vérifications Chef BAL FPTGP</h1>
  <div id="date"></div>
</header>

<main>

<fieldset>
    <legend>CABINE ARRIERE</legend>
    <img src="images/Cabinearrierebinome.jpg" />
    <label><input type="checkbox" id="1 ARI complet (Lampe ADALIT, 1 Liaison personnel, 1 Pièce faciale, 1 Cagoule, 1 Commande en sac)">1 ARI complet (Lampe ADALIT, 1 Liaison personnel, 1 Pièce faciale, 1 Cagoule, 1 Commande en sac)</label>
    <label><input type="checkbox" id="1 Rhinoevac">1 Rhinoevac</label>
    <label><input type="checkbox" id="1 Chasuble">1 Chasuble</label>
  </fieldset>

  <fieldset>
    <legend>COFFRE MILIEUX GAUCHE</legend>
    <img src="images/coffremilieugauche.jpg" />
    <label><input type="checkbox" id="1 SAC O2">1 SAC O2</label>
    <label><input type="checkbox" id="1 Caisse avec 2 brancards souples + 4 couvertures de survie">1 Caisse avec 2 brancards souples + 4 couvertures de survie</label>
    <label><input type="checkbox" id="1 Caisse avec étrangleurs + sangles de fuite + obturateurs">1 Caisse avec étrangleurs + sangles de fuite + obturateurs</label>
  </fieldset>

  <fieldset>
    <legend>TOIT</legend>
    <img src="images/toit.jpg" />
    <label><input type="checkbox" id="3 Aspiraux">3 Aspiraux</label>
    <label><input type="checkbox" id="2 DFT">2 DFT</label>
    <label><input type="checkbox" id="2 Fourches recourbées">2 Fourches recourbées</label>
    <label><input type="checkbox" id="2 Fourches droites">2 Fourches droites</label>
    <label><input type="checkbox" id="1 Scie à bûche">1 Scie à bûche</label>
    <label><input type="checkbox" id="1 Grande pince">1 Grande pince</label>
    <label><input type="checkbox" id="1 Hachette combinée pioche">1 Hachette combinée pioche</label>
    <label><input type="checkbox" id="1 Pioche et son manche">1 Pioche et son manche</label>
    <label><input type="checkbox" id="1 Balais de cantonnier">1 Balais de cantonnier</label>
    <label><input type="checkbox" id="1 Barre de levage cabine">1 Barre de levage cabine</label>
    <label><input type="checkbox" id="1 Canne plongeante">1 Canne plongeante</label>
    <label><input type="checkbox" id="1 Grande hache">1 Grande hache</label>
    <label><input type="checkbox" id="2 Pelles">2 Pelles</label>
    <label><input type="checkbox" id="1 Lève plaque">1 Lève plaque</label>
    <label><input type="checkbox" id="1 Échelle à coulisse">1 Échelle à coulisse</label>
    <label><input type="checkbox" id="1 Échelle à crochet">1 Échelle à crochet</label>
    <label><input type="checkbox" id="1 Gaffe">1 Gaffe</label>
  </fieldset>

<div class="buttons">
  <button onclick="saveAndReturn()">Enregistrer et revenir au menu</button>
</div>
<footer>
  CIS Taverny – Vérifications opérationnelles
</footer>

<script>
document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// 🔹 Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD14dNcDQWq4SygSlo8YC8bJWisLYOh0Es",
  authDomain: "veriftav.firebaseapp.com",
  projectId: "veriftav",
  storageBucket: "veriftav.firebasestorage.app",
  messagingSenderId: "401217101102",
  appId: "1:401217101102:web:dd375734d4f0464c146ebf",
  measurementId: "G-KVSC8V8M1B"
};

// 🔹 Initialisation Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 Récupérer toutes les checkboxes
function getData() {
  const inputs = document.querySelectorAll("input[type=checkbox]");
  const data = {};
  inputs.forEach(input => data[input.id] = input.checked);
  return data;
}

// 🔹 Surligner les éléments non cochés
function highlightMissing(data) {
  // Reset
  document.querySelectorAll("label").forEach(label => label.style.backgroundColor = "");
  // Surligner les manquants
  for (const [id, checked] of Object.entries(data)) {
    if (!checked) {
      const input = document.getElementById(id);
      if (input) input.parentElement.style.backgroundColor = "#ED1C24";
    }
  }
}

// 🔹 Sauvegarder une vérification avec ID unique basé sur la date
async function saveCheck() {
  const data = getData();
  highlightMissing(data);

  try {
    const timestamp = new Date();
    const docId = "EQUIPIER BAL_" + timestamp.getTime(); // ID unique
    const docRef = doc(db, "verifications", docId);

    // Récupérer le nom du vérificateur depuis localStorage si existant
    const nomVerificateur = localStorage.getItem("nomVerificateur") || "Inconnu";

    await setDoc(docRef, {
      nomDoc: "EQUIPIER BAL",
      date: timestamp,
      verificateur: nomVerificateur,
      data
    });

    const allChecked = Object.values(data).every(v => v === true);
  } catch (e) {
    console.error(e);
    alert("Erreur enregistrement : " + e.message);
  }
}

// 🔹 Charger le dernier état pour surligner les éléments manquants
async function highlightLastMissing() {
  try {
    const q = query(
      collection(db, "verifications"),
      where("nomDoc", "==", "EQUIPIER BAL"),
      orderBy("date", "desc"),
      limit(1)
    );

    const snapshot = await getDocs(q);
    if (!snapshot.empty) {
      const lastDoc = snapshot.docs[0].data();
      highlightMissing(lastDoc.data); // Surligner sans cocher
    }
  } catch (e) {
    console.error("Erreur chargement dernière vérification :", e);
  }
}

// 🔹 Fonction combinée pour le bouton : enregistrer et revenir au menu
window.saveAndReturn = async function() {
  await saveCheck();           // Sauvegarde la vérification
  location.href = "index.html"; // Retour au menu principal
};

// 🔹 Exécuter au chargement pour surligner les éléments manquants précédents
window.addEventListener("DOMContentLoaded", highlightLastMissing);
</script>


</body>
</html>
