<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSSUAP – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif; }
body { background:#fff3e0; color:#212121; display:flex; flex-direction:column; min-height:100vh; }

/* ===== HEADER ===== */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  background:#d32f2f;
  color:white;
  border-radius:0 0 12px 12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}
header img { height:40px; border-radius:6px; border:2px solid #fff; }
header h1 { flex:1; text-align:center; font-size:1rem; font-weight:700; margin:0 0.5rem; }
header #date { font-size:0.8rem; opacity:0.85; }

/* ===== ALERT MESSAGE ===== */
#attention-msg {
  background:#ffb74d;
  color:#b71c1c;
  font-weight:bold;
  text-align:center;
  padding:0.7rem;
  border-radius:10px;
  box-shadow:0 0 12px #ff6f00;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.2rem;
  margin:0.5rem 0;
}

/* ===== FIELDSETS ===== */
fieldset {
  border:2px solid #b71c1c;
  border-radius:10px;
  padding:0.8rem;
  background:#fff8e1;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  margin-bottom:0.8rem;
}
legend { font-weight:bold; color:#b71c1c; padding:0 5px; font-size:0.9rem; }

/* ===== IMAGES ===== */
.image-container {
  width:100%;
  margin:0.5rem 0;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.image-container img { width:100%; height:auto; display:block; border-radius:8px; }

/* ===== CHECKLIST ===== */
label {
  display:flex;
  align-items:center;
  gap:8px;
  padding:0.5rem;
  border-bottom:1px solid #ffe0b2;
  font-size:0.85rem;
  cursor:pointer;
  border-radius:5px;
  transition:0.2s;
}
label:hover { background:#fff176; }
input[type="checkbox"] { transform:scale(1.3); accent-color:#b71c1c; }
label.missing { background:#ed1c24; color:white; font-weight:bold; }

/* ===== BOUTONS ===== */
.buttons {
  display:flex;
  justify-content:center;
  margin:1rem 0 2rem 0;
}
button {
  width:95%;
  padding:0.8rem;
  border:none;
  border-radius:10px;
  font-size:1rem;
  font-weight:bold;
  background:#b71c1c;
  color:white;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  transition:0.3s;
}
button:hover { transform:translateY(-2px); background:#d32f2f; }

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:0.75rem;
  padding:0.5rem;
  background:#ffd54f;
  color:#b71c1c;
  font-weight:bold;
  border-top-left-radius:10px;
  border-top-right-radius:10px;
}

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width:480px){
  header img { height:35px; }
  header h1 { font-size:0.95rem; }
  header #date { font-size:0.75rem; }
  label { font-size:0.8rem; padding:0.4rem; }
  button { font-size:0.95rem; padding:0.7rem; }
  fieldset { padding:0.7rem; }
  legend { font-size:0.85rem; }
}
</style>
</head>

<body>

<header>
  <img src="images/logo.png" alt="Logo CIS Taverny">
  <h1>Vérifications Chef d'agrès VSSUAP</h1>
  <div id="date"></div>
</header>

<main>

<fieldset>
  <legend>RAPPEL</legend>
  <p>Recharger la carte VIGIK</p>
  </fieldset>


<fieldset>
  <legend>Cabine avant </legend>
   <div class="image-container"><img src="images/CabineavantFPT.jpg" alt="Cabine avant FPTGP"></div>
    <label><input type="checkbox" id="Commande en sac">Commande en sac</label>
    <label><input type="checkbox" id="Chasuble">Chasuble</label>
    <label><input type="checkbox" id="Jeton de présence">Jeton de présence</label>
    <label><input type="checkbox" id="Trousse clés">Trousse clés</label>
    <label><input type="checkbox" id="Lampe ADALIT">Lampe ADALIT</label>
    <label><input type="checkbox" id="Radio TTH">Radio TTH</label>
    <label><input type="checkbox" id="Radio TPH900">Radio TPH900</label>
    <label><input type="checkbox" id="Tablette CATE">Tablette CATE</label>
    <label><input type="checkbox" id="OFD">OFD</label>
    <label><input type="checkbox" id="Caméra thermique">Caméra thermique</label>
    <label><input type="checkbox" id="2 Détecteurs multi-gaz">2 Détecteurs multi-gaz</label>
    <label><input type="checkbox" id="Carte VIGIK">Carte VIGIK</label>
	</fieldset>

<fieldset>
  <legend>Cabine arrière </legend>
  <div class="image-container"><img src="images/Cabinearriere.jpg" alt="Cabine arrière FPTGP"></div>
    <label><input type="checkbox" id="ARI complet">ARI complet</label>
</fieldset>

<fieldset>
  <legend>Coffre avant droit </legend>
 <div class="image-container"><img src="images/Coffreavantdroit.jpg" alt="Coffre avant droit FPTGP"></div>
    <label><input type="checkbox" id="DAL complète">DAL complète</label>
    <label><input type="checkbox" id="Gabarits tuyaux">Gabarits tuyaux</label>
    <label><input type="checkbox" id="Aspiraux">Aspiraux</label>
    <label><input type="checkbox" id="Haligan + hache">Haligan + hache</label>
    <label><input type="checkbox" id="Masse">Masse</label></fieldset>

<fieldset>
  <legend>coffre milieu droit </legend>
  <div class="image-container"><img src="images/Coffremilieuxdroit.jpg" alt="Coffre milieu droit FPTGP"></div>
    <label><input type="checkbox" id="Lance COMPACTOR">Lance COMPACTOR</label>
</fieldset>



<div class="buttons">
  <button onclick="saveAndReturn()">Enregistrer et revenir au menu</button>
</div>

<footer>
  CIS Taverny – Vérifications opérationnelles
</footer>

<script>
document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD14dNcDQWq4SygSlo8YC8bJWisLYOh0Es",
  authDomain: "veriftav.firebaseapp.com",
  projectId: "veriftav",
  storageBucket: "veriftav.firebasestorage.app",
  messagingSenderId: "401217101102",
  appId: "1:401217101102:web:dd375734d4f0464c146ebf",
  measurementId: "G-KVSC8V8M1B"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getData() {
  const inputs = document.querySelectorAll("input[type=checkbox]");
  const data = {};
  inputs.forEach(input => data[input.id] = input.checked);
  return data;
}

function highlightMissing(data) {
  document.querySelectorAll("label").forEach(label => label.classList.remove("missing"));
  for (const [id, checked] of Object.entries(data)) {
    if (!checked) {
      const input = document.getElementById(id);
      if (input) input.parentElement.classList.add("missing");
    }
  }
}

async function saveCheck() {
  const data = getData();
  highlightMissing(data);
  try {
    const timestamp = new Date();
    const docId = "CA VSSUAP_" + timestamp.getTime();
    const docRef = doc(db, "verifications", docId);
    const nomVerificateur = localStorage.getItem("nomVerificateur") || "Inconnu";
    await setDoc(docRef, { nomDoc: "CA VSSUAP", date: timestamp, verificateur: nomVerificateur, data });
  } catch (e) { console.error(e); alert("Erreur enregistrement : " + e.message); }
}

async function highlightLastMissing() {
  try {
    const q = query(collection(db, "verifications"), where("nomDoc","==","CA VSSUAP"), orderBy("date","desc"), limit(1));
    const snapshot = await getDocs(q);
    if (!snapshot.empty) highlightMissing(snapshot.docs[0].data().data);
  } catch (e) { console.error(e); }
}

window.saveAndReturn = async function() { await saveCheck(); location.href = "index.html"; };
window.addEventListener("DOMContentLoaded", highlightLastMissing);
</script>

</body>
</html>
