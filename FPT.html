<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPTGP – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif; }
body { background:#fff3e0; color:#212121; display:flex; flex-direction:column; min-height:100vh; }

/* ===== HEADER ===== */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  background:#d32f2f;
  color:white;
  border-radius:0 0 12px 12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}
header img { height:40px; border-radius:6px; border:2px solid #fff; }
header h1 { flex:1; text-align:center; font-size:1rem; font-weight:700; margin:0 0.5rem; }
header #date { font-size:0.8rem; opacity:0.85; }

/* ===== ALERT MESSAGE ===== */
#attention-msg {
  background:#ffb74d;
  color:#b71c1c;
  font-weight:bold;
  text-align:center;
  padding:0.7rem;
  border-radius:10px;
  box-shadow:0 0 12px #ff6f00;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.2rem;
  margin:0.5rem 0;
}

/* ===== FIELDSETS ===== */
fieldset {
  border:2px solid #b71c1c;
  border-radius:10px;
  padding:0.8rem;
  background:#fff8e1;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  margin-bottom:0.8rem;
}
legend { font-weight:bold; color:#b71c1c; padding:0 5px; font-size:0.9rem; }

/* ===== IMAGES ===== */
.image-container {
  width:100%;
  margin:0.5rem 0;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.image-container img { width:100%; height:auto; display:block; border-radius:8px; }

/* ===== CHECKLIST ===== */
label {
  display:flex;
  align-items:center;
  gap:8px;
  padding:0.5rem;
  border-bottom:1px solid #ffe0b2;
  font-size:0.85rem;
  cursor:pointer;
  border-radius:5px;
  transition:0.2s;
}
label:hover { background:#fff176; }
input[type="checkbox"] { transform:scale(1.3); accent-color:#b71c1c; }
label.missing { background:#ed1c24; color:white; font-weight:bold; }

/* ===== BOUTONS ===== */
.buttons {
  display:flex;
  justify-content:center;
  margin:1rem 0 2rem 0;
}
button {
  width:95%;
  padding:0.8rem;
  border:none;
  border-radius:10px;
  font-size:1rem;
  font-weight:bold;
  background:#b71c1c;
  color:white;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  transition:0.3s;
}
button:hover { transform:translateY(-2px); background:#d32f2f; }

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:0.75rem;
  padding:0.5rem;
  background:#ffd54f;
  color:#b71c1c;
  font-weight:bold;
  border-top-left-radius:10px;
  border-top-right-radius:10px;
}

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width:480px){
  header img { height:35px; }
  header h1 { font-size:0.95rem; }
  header #date { font-size:0.75rem; }
  label { font-size:0.8rem; padding:0.4rem; }
  button { font-size:0.95rem; padding:0.7rem; }
  fieldset { padding:0.7rem; }
  legend { font-size:0.85rem; }
}
</style>
</head>

<body>

<header>
  <img src="images/logo.png" alt="Logo CIS Taverny">
  <h1>Vérifications FPTGP</h1>
  <div id="header-date"></div>
</header>

<main>
  <div class="card">
    <h2>Choisissez un poste</h2>
    <div class="buttons">
      <button class="CA" onclick="location.href='CAFPT.html'">
        <i class="fa-solid fa-walkie-talkie"></i> Chef d'agrès
      </button>
      <button class="CO" onclick="location.href='COFPT.html'">
        <i class="fas fa-car-side"></i> Conducteur
      </button>
      <button class="CBAT" onclick="location.href='CEBAT.html'">
        <i class="fas fa-fire-extinguisher"></i> Chef BAT
      </button>
      <button class="EBAT" onclick="location.href='EQBAT.html'">
        <i class="fas fa-fire-extinguisher"></i> Equipier BAT
      </button>
      <button class="CBAL" onclick="location.href='CEBAL.html'">
        <i class="fas fa-fire-extinguisher"></i> Chef BAL
      </button>
      <button class="EBAL" onclick="location.href='EQBAL.html'">
        <i class="fas fa-fire-extinguisher"></i> Equipier BAL
      </button>
    </div>
  </div>
</main>

<footer>
  CIS Taverny – Vérifications opérationnelles
</footer>

<script>
// Date dynamique
document.getElementById('header-date').textContent = new Date().toLocaleDateString('fr-FR', {
  weekday:'long', day:'numeric', month:'long', year:'numeric'
});
</script>

</body>
</html>
